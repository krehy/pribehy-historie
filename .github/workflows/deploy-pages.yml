name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/pribeh-historie-frontend-w7usf4]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Zapne GitHub Pages (build type = GitHub Actions), pokud ještě není.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
